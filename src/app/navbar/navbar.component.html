<nav
  class="fixed top-0 left-0 w-full z-50 transition-all duration-500"
  [ngClass]="{
    'bg-black/80 backdrop-blur-lg border-b border-white/10 shadow-lg shadow-black/40': isScrolled,
    'bg-transparent': !isScrolled
  }"
>
  <div class="max-w-7xl mx-auto px-6 md:px-10 py-5 flex items-center justify-between">

    <!-- LEFT Nav Links -->
    <ul class="hidden md:flex items-center gap-8 text-xs tracking-widest uppercase font-inter w-1/3">
      <li>
        <a
          routerLink="/home"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Home</a>
      </li>
      <li>
        <a
          routerLink="/home"
          fragment="about"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >About</a>
      </li>
      <li>
        <a
          routerLink="/profile"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Profiles</a>
      </li>
    </ul>

    <!-- CENTER: Text Only Logo -->
    <a
      routerLink="/home"
      (click)="closeMobileMenu()"
      class="hidden md:flex flex-col items-center group w-1/3 justify-center"
    >
      <span
        class="text-white text-2xl tracking-[0.4em] uppercase font-cinzel font-bold group-hover:tracking-[0.55em] transition-all duration-500"
      >
        DHRUVAM
      </span>
    </a>

    <!-- Mobile: Text Only Center -->
    <a
      routerLink="/home"
      (click)="closeMobileMenu()"
      class="flex md:hidden items-center group"
    >
      <span class="text-white text-lg tracking-[0.3em] uppercase font-cinzel font-bold">
        DHRUVAM
      </span>
    </a>

    <!-- RIGHT Nav Links -->
    <ul class="hidden md:flex items-center gap-8 text-xs tracking-widest uppercase font-inter w-1/3 justify-end">
      <li>
        <a
          routerLink="/media"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Media</a>
      </li>
      <li>
        <a
          routerLink="/project"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Releases</a>
      </li>
      <li>
        <a
          routerLink="/contact"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Contact</a>
      </li>
    </ul>

    <!-- Mobile Hamburger Button -->
    <button
      class="md:hidden text-white focus:outline-none"
      (click)="toggleMobileMenu()"
      aria-label="Toggle menu"
    >
      <span *ngIf="!isMobileMenuOpen">
        <i class="fas fa-bars text-xl"></i>
      </span>
      <span *ngIf="isMobileMenuOpen">
        <i class="fas fa-times text-xl"></i>
      </span>
    </button>

  </div>

  <!-- Mobile Menu Dropdown -->
  <div
    *ngIf="isMobileMenuOpen"
    class="md:hidden bg-black/95 backdrop-blur-xl border-t border-white/10 px-6 py-6 flex flex-col gap-6"
  >
    <a routerLink="/home" routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-xs uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()">Home</a>
    <a routerLink="/home" fragment="about"
      class="text-gray-400 hover:text-white text-xs uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()">About</a>
    <a routerLink="/profile" routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-xs uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()">Profiles</a>
    <a routerLink="/media" routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-xs uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()">Media</a>
    <a routerLink="/project" routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-xs uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()">Releases</a>
    <a routerLink="/contact" routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-xs uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()">Contact</a>
  </div>

</nav>
