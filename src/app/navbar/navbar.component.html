<nav
  class="fixed top-0 left-0 w-full z-50 transition-all duration-500"
  [ngClass]="{
    'bg-black/80 backdrop-blur-lg border-b border-white/10 shadow-lg shadow-black/40': isScrolled,
    'bg-transparent': !isScrolled
  }"
>
  <div class="max-w-7xl mx-auto px-6 md:px-10 py-4 flex items-center justify-between">

    <!-- LEFT Nav Links -->
    <ul class="hidden md:flex items-center gap-10 text-sm tracking-widest uppercase font-inter w-1/3">
      <li>
        <a
          routerLink="/home"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Home</a>
      </li>
      <li>
        <a
          routerLink="/profile"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Profiles</a>
      </li>
    </ul>

    <!-- CENTER Logo + Name -->
    <a routerLink="/home" (click)="closeMobileMenu()" class="hidden md:flex flex-col items-center gap-1 group w-1/3 justify-center">
      <img
        src="assets/logo.png"
        alt="DHRUVAM Logo"
        class="h-10 w-auto object-contain group-hover:scale-110 transition-transform duration-300 drop-shadow-lg"
      />
      <span class="text-white text-xs tracking-[0.35em] uppercase font-cinzel font-semibold group-hover:tracking-[0.5em] transition-all duration-500">
        DHRUVAM
      </span>
    </a>

    <!-- Mobile: Just Logo + Name centered -->
    <a routerLink="/home" (click)="closeMobileMenu()" class="flex md:hidden flex-col items-center gap-1 group">
      <img src="assets/logo.png" alt="DHRUVAM Logo" class="h-9 w-auto object-contain drop-shadow-lg" />
      <span class="text-white text-xs tracking-[0.3em] uppercase font-cinzel font-semibold">DHRUVAM</span>
    </a>

    <!-- RIGHT Nav Links -->
    <ul class="hidden md:flex items-center gap-10 text-sm tracking-widest uppercase font-inter w-1/3 justify-end">
      <li>
        <a
          routerLink="/project"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Releases</a>
      </li>
      <li>
        <a
          routerLink="/contact"
          routerLinkActive="text-white border-b border-white pb-0.5"
          class="text-gray-400 hover:text-white transition-colors duration-300"
        >Contact</a>
      </li>
    </ul>

    <!-- Mobile Hamburger Button -->
    <button
      class="md:hidden text-white focus:outline-none"
      (click)="toggleMobileMenu()"
      aria-label="Toggle menu"
    >
      <span *ngIf="!isMobileMenuOpen">
        <i class="fas fa-bars text-2xl"></i>
      </span>
      <span *ngIf="isMobileMenuOpen">
        <i class="fas fa-times text-2xl"></i>
      </span>
    </button>

  </div>

  <!-- Mobile Menu Dropdown -->
  <div
    *ngIf="isMobileMenuOpen"
    class="md:hidden bg-black/95 backdrop-blur-xl border-t border-white/10 px-6 py-6 flex flex-col gap-6"
  >
    <a
      routerLink="/home"
      routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-sm uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()"
    >Home</a>
    <a
      routerLink="/profile"
      routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-sm uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()"
    >Profiles</a>
    <a
      routerLink="/project"
      routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-sm uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()"
    >Releases</a>
    <a
      routerLink="/contact"
      routerLinkActive="text-white"
      class="text-gray-400 hover:text-white text-sm uppercase tracking-widest transition-colors"
      (click)="closeMobileMenu()"
    >Contact</a>
  </div>

</nav>
