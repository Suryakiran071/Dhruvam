<div class="min-h-screen bg-black pt-28 pb-24 px-6 md:px-10">

  <!-- Header -->
  <div class="text-center mb-20">
    <p class="text-gray-500 uppercase tracking-widest text-xs font-inter mb-3">Meet The Team</p>
    <h1 class="text-white text-5xl md:text-6xl font-bold font-cinzel tracking-widest uppercase">The Lineup</h1>
    <div class="h-px w-24 bg-white/20 mx-auto mt-6"></div>
  </div>

  <!-- Cards Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 max-w-7xl mx-auto">

    <!-- Member Card -->
    <div
      *ngFor="let member of bandMembers"
      class="group relative bg-zinc-950 rounded-2xl overflow-hidden shadow-2xl border border-zinc-800 hover:border-white/20 transition-all duration-400 hover:-translate-y-2"
    >

      <!-- Image Container -->
      <div class="aspect-square overflow-hidden">
        <a [href]="member.instaid" target="_blank">
          <img
            [src]="member.photo"
            [alt]="member.name"
            class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000"
          />
        </a>
      </div>

      <!-- Info -->
      <div class="p-5 bg-zinc-950 border-t border-zinc-800 text-center">
        <h2 class="text-white text-xl font-bold font-cinzel tracking-tight">{{ member.name }}</h2>
        <p class="text-gray-500 font-inter font-medium uppercase text-xs mt-1 tracking-widest">
          {{ member.role }}
        </p>
        <!-- Instagram link -->
        <a
          [href]="member.instaid"
          target="_blank"
          class="inline-flex items-center gap-1.5 mt-3 text-gray-600 hover:text-white text-xs font-inter transition-colors duration-300"
        >
          <i class="fab fa-instagram"></i>
          <span>Instagram</span>
        </a>
      </div>

      <!-- Bottom Accent Line -->
      <div class="absolute bottom-0 left-0 w-full h-0.5 bg-white scale-x-0 group-hover:scale-x-100 transition-transform duration-400 origin-left"></div>

    </div>

  </div>

</div>
